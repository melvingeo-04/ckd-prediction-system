<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register — CKD Risk Assessment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body style="background:#f4f7fb;font-family:'DM Sans',sans-serif">
<div class="min-vh-100 d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="text-center mb-4">
          <div class="brand-icon mx-auto mb-2" style="width:48px;height:48px;font-size:1.4rem">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C9.5 2 7 4 7 7.5C7 10 8 12 8 14.5C8 17 6.5 19 5 20.5C6.5 21.5 8 22 9.5 22C11.5 22 13 20.5 13 18.5C13 16 12 14 12 11.5C12 9 13.5 7 15 5.5C14 3.5 13 2 12 2Z" fill="white" opacity="0.9"/>
              <path d="M15 4C16.5 5.5 17 8 17 10C17 13 15.5 15 15.5 17.5C15.5 19.5 16.5 21 18 21.5C19 20 19.5 18 19.5 16C19.5 13 18 11 18 8.5C18 6.5 17 4.5 15.5 3C15.3 3.3 15.1 3.6 15 4Z" fill="white" opacity="0.7"/>
            </svg>
          </div>
          <h5 class="fw-700 mb-0">CKD Risk Assessment</h5>
          <p class="text-muted small">Create your doctor account</p>
        </div>

        <div class="kg-card">
          <div class="p-4">
            <h5 class="fw-700 mb-1">Doctor Registration</h5>
            <p class="text-muted small mb-4">Fill in your details to get started</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} py-2 px-3 small rounded-3 mb-3 border-0">{{ msg }}</div>
              {% endfor %}
            {% endwith %}

            <form method="POST" class="kg-form">
              <div class="row g-3">

                <div class="col-12">
                  <label class="form-label">Full Name <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="name" class="form-control" placeholder="Dr. Rahul Menon" required autofocus/>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Specialization</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-award"></i></span>
                    <input type="text" name="specialization" class="form-control" placeholder="Nephrologist"/>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Hospital / Clinic</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <input type="text" name="hospital" class="form-control" placeholder="City Hospital"/>
                  </div>
                </div>

                <div class="col-12">
                  <label class="form-label">Email Address <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="doctor@hospital.com" required/>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Username <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-at"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="drrahul" required/>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Password <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Min. 6 chars" minlength="6" required/>
                  </div>
                </div>

                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-600">
                    <i class="bi bi-person-check me-2"></i>Create Account
                  </button>
                </div>

              </div>
            </form>

            <hr class="my-3"/>
            <p class="text-center text-muted small mb-0">
              Already have an account?
              <a href="/login" class="text-primary fw-500 text-decoration-none">Sign in</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
